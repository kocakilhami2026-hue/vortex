<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX - Oyuncuların Buluşma Noktası</title>
    <style>
        /* Modern ve Olgun Oyuncu Teması */
        body {
            margin: 0;
            padding: 0;
            background-color: #0e1118; /* Koyu Discord Arka Planı */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #5865F2, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .subtitle {
            color: #99aab5;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        .main-card {
            background: #141a26;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        label {
            font-size: 1rem;
            color: #99aab5;
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Havalı Seçim Kutuları */
        select, input {
            width: 100%;
            padding: 12px;
            background-color: #1c2333;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        select:focus, input:focus {
            border-color: #5865F2;
        }

        /* Takım Bulma Butonu */
        .btn-search {
            width: 100%;
            background: linear-gradient(45deg, #5865F2, #4752c4);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5);
        }

        /* Oyuncu Sonuç Listesi Bölümü */
        .results-section {
            width: 100%;
            max-width: 600px;
            display: none; /* İlk başta gizli, aratınca açılacak */
        }

        .results-title {
            font-size: 1.2rem;
            color: #00d2ff;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .player-card {
            background: #1c2333;
            border-left: 5px solid #5865F2;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .player-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            color: #ffffff;
        }

        .player-info p {
            margin: 0;
            font-size: 0.9rem;
            color: #99aab5;
        }

        .player-badge {
            background-color: rgba(0, 210, 255, 0.1);
            color: #00d2ff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
        }

        /* Discord Kopyalama Butonu */
        .btn-discord {
            background-color: #248046; /* Discord Yeşili */
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-discord:hover {
            background-color: #1a6535;
        }
    </style>
</head>
<body>

    <header>
        <h1>VORTEX</h1>
        <div class="subtitle">Yalnız Oynama. Akıllı Eşleşme ile Takımını Kur!</div>
    </header>

    <!-- Giriş Form Kartı -->
    <div class="main-card">
        <label for="username">Oyun İçi Adın (Nick):</label>
        <input type="text" id="username" placeholder="Örn: Sergen_10">

        <label for="discordId">Discord Kullanıcı Adın (ID):</label>
        <input type="text" id="discordId" placeholder="Örn: kanka_discord_12">

        <label for="gameSelect">Oynamak İstediğin Oyun:</label>
        <select id="gameSelect">
            <option value="eFootball">eFootball</option>
            <option value="Free Fire">Free Fire</option>
            <option value="Valorant">Valorant</option>
            <option value="PUBG Mobile">PUBG Mobile</option>
        </select>

        <label for="styleSelect">Oyun Tarzın:</label>
        <select id="styleSelect">
            <option value="Rank Kasma">Rank Kasma (Ciddi/E-Spor)</option>
            <option value="Makarasına">Makarasına / Eğlence</option>
            <option value="Turnuva">Turnuva Kadrosu</option>
        </select>

        <button class="btn-search" onclick="takimBul()">UYGUN SQUAD'LARI LİSTELE</button>
    </div>

    <!-- Sonuçların Listelendiği Alan -->
    <div class="results-section" id="resultsSection">
        <div class="results-title" id="resultsTitle">Senin İçin Bulunan Uyumlu Oyuncular:</div>
        <div id="playerList"></div>
    </div>

    <script>
        // Havuzdaki Örnek Oyuncu Veritabanı
        const oyuncuHavuzu = [
            { nick: "Neymar_Edits", game: "eFootball", style: "Rank Kasma", discord: "ney_edit99", bio: "Hücum hattına pasör arıyorum, troll gelmesin." },
            { nick: "Kayserili_38", game: "Free Fire", style: "Makarasına", discord: "kayseri_ff", bio: "Gece tayfası, mikrofon açık eğlencesine." },
            { nick: "Alpha_Gamer", game: "Valorant", style: "Rank Kasma", discord: "alpha_val", bio: "Radyant hedefli, ciddi oynayacak Duo." },
            { nick: "GamerGirl_X", game: "Free Fire", style: "Rank Kasma", discord: "gg_freefire", bio: "Rütbe kasıyoruz, rush oynayacak adam lazım." },
            { nick: "Vefa_Kartali", game: "eFootball", style: "Turnuva", discord: "vefacim", bio: "Turnuva kadrosuna defans emniyeti arıyoruz." },
            { nick: "Shadow_Walk", game: "PUBG Mobile", style: "Makarasına", discord: "shadow_pubg", bio: "Kafa dengi, muhabbeti saran tayfa gelsin." }
        ];

        function takimBul() {
            const isim = document.getElementById("username").value;
            const discord = document.getElementById("discordId").value;
            const secilenOyun = document.getElementById("gameSelect").value;
            const secilenTarz = document.getElementById("styleSelect").value;

            if(isim === "" || discord === "") {
                alert("Kanka lütfen önce kendi Nickname ve Discord ID bilgilerini yaz!");
                return;
            }

            // Yapay zeka eşleştirme algoritmasını simüle ediyoruz kanka
            const filtreliOyuncular = oyuncuHavuzu.filter(o => o.game === secilenOyun && o.style === secilenTarz);
            
            const listAlan = document.getElementById("playerList");
            listAlan.innerHTML = ""; // Önceki sonuçları temizle
            
            document.getElementById("resultsSection").style.display = "block";

            if(filtreliOyuncular.length === 0) {
                // Eğer tam eşleşen yoksa, o oyundaki diğer oyuncuları yapay zeka alternatif olarak getiriyor
                const alternatifler = oyuncuHavuzu.filter(o => o.game === secilenOyun);
                if(alternatifler.length > 0) {
                    document.getElementById("resultsTitle").innerHTML = "⚠️ Tam tarzına göre bulunamadı ama Aynı Oyunu Oynayan Yakın Auralı Oyuncular:";
                    renderList(alternatifler);
                } else {
                    document.getElementById("resultsTitle").innerHTML = "❌ Şu an bu oyunda aktif oyuncu bulunamadı, havuz güncelleniyor.";
                }
            } else {
                document.getElementById("resultsTitle").innerHTML = "🔥 Yapay Zeka Algoritması Sizin İçin %98 Uyumlu Oyuncuları Buldu:";
                renderList(filtreliOyuncular);
            }
        }

        function renderList(liste) {
            const listAlan = document.getElementById("playerList");
            liste.forEach(oyuncu => {
                const kart = document.createElement("div");
                kart.className = "player-card";
                kart.innerHTML = `
                    <div class="player-info">
                        <h3>${oyuncu.nick}</h3>
                        <p>${oyuncu.bio}</p>
                        <span class="player-badge">${oyuncu.style}</span>
                    </div>
                    <button class="btn-discord" onclick="kopyala('${oyuncu.discord}')">Discord Kopyala</button>
                `;
                listAlan.appendChild(kart);
            });
        }

        function kopyala(text) {
            navigator.clipboard.writeText(text);
            alert("Discord Kullanıcı Adı Kopyalandı: " + text + "\nŞimdi Discord'dan ekleyip maça girebilirsin kanka!");
        }
    </script>

</body>
</html>
