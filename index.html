<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX - Oyuncuların Buluşma Noktası</title>
    <style>
        /* Genel Ayarlar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        /* SCREEN 1: GİRİŞ EKRANI */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #242424 0%, #121212 100%);
        }

        .login-container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #333;
        }

        .login-container h1 {
            color: #3b82f6;
            margin-bottom: 25px;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaaaaa;
            font-size: 0.9rem;
        }

        .form-group select, .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        .form-group select:focus, .form-group input:focus {
            border-color: #3b82f6;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #1d4ed8;
        }

        /* SCREEN 2: SİMSİYAH DISCORD LOGLOG EKRANI */
        #app-screen {
            display: none; /* İlk başta gizli */
            height: 100vh;
            grid-template-columns: 240px 1fr 260px;
        }

        /* 1. Sol Sütun: Kanallar */
        .sidebar-channels {
            background-color: #111111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .app-title {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #3b82f6;
            border-bottom: 1px solid #222;
            text-align: center;
        }

        .search-box {
            padding: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            background-color: #222;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            font-size: 0.85rem;
        }

        .channel-section {
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .channel-list {
            list-style: none;
        }

        .channel-item {
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            color: #b9bbbe;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
        }

        .channel-item:hover, .channel-item.active {
            background-color: #222;
            color: white;
        }

        .channel-item::before {
            content: "# ";
            color: #555;
            font-weight: bold;
            margin-right: 5px;
        }

        /* 2. Orta Sütun: Sohbet Alanı */
        .chat-area {
            background-color: #151515;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            padding: 20px;
            background-color: #111;
            border-bottom: 1px solid #222;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            flex-direction: column;
            background-color: #1c1c1c;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
            max-width: 85%;
        }

        .message-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .msg-user {
            font-weight: bold;
            color: #60a5fa;
            font-size: 0.9rem;
        }

        .msg-tag {
            background-color: #2563eb;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .msg-text {
            color: #dcddde;
            font-size: 0.95rem;
            word-break: break-word;
        }

        .chat-input-area {
            padding: 20px;
            background-color: #111;
            border-top: 1px solid #222;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .input-wrapper input {
            flex-grow: 1;
            padding: 14px;
            background-color: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .input-wrapper button {
            padding: 0 20px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 3. Sağ Sütun: Arkadaşlar / Çevrimiçi Bölümü */
        .sidebar-friends {
            background-color: #111111;
            border-left: 1px solid #222;
            padding: 20px;
            overflow-y: auto;
        }

        .friend-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.9rem;
            color: #b9bbbe;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: GİRİŞ EKRANI -->
    <div id="login-screen">
        <div class="login-container">
            <h1>VORTEX</h1>
            <div class="form-group">
                <label>Kullanıcı Adın</label>
                <input type="text" id="username-input" placeholder="Örn: OyunCanavarı" required>
            </div>
            <div class="form-group">
                <label>Oynamak İstediğin Oyun</label>
                <select id="game-select">
                    <option value="eFootball">eFootball</option>
                    <option value="Free Fire">Free Fire</option>
                </select>
            </div>
            <div class="form-group">
                <label>Oyun Tarzın</label>
                <select id="style-select">
                    <option value="Rank Kasma">Rank Kasma (Ciddi/E-Spor)</option>
                    <option value="Eğlence">Eğlence / Makara</option>
                </select>
            </div>
            <button class="submit-btn" onclick="enterApp()">UYGUN SQUAD'LARI LİSTELE</button>
        </div>
    </div>

    <!-- SCREEN 2: DISCORD KLONU ANA EKRAN -->
    <div id="app-screen">
        
        <!-- Sol Menü: Arama ve Kanallar -->
        <div class="sidebar-channels">
            <div class="app-title">VORTEX CHAT</div>
            <div class="search-box">
                <input type="text" placeholder="Kanal veya arkadaş ara...">
            </div>
            <div class="channel-section">
                <span class="section-title">Ses ve Yazı Odaları</span>
                <ul class="channel-list">
                    <li class="channel-item active" onclick="changeChannel('genel-sohbet')">genel-sohbet</li>
                    <li class="channel-item" onclick="changeChannel('efootball-squad')">efootball-squad</li>
                    <li class="channel-item" onclick="changeChannel('freefire-ekip')">freefire-ekip</li>
                    <li class="channel-item" onclick="changeChannel('rank-kasanlar')">rank-kasanlar</li>
                </ul>
            </div>
        </div>

        <!-- Orta Alan: Sohbet Penceresi -->
        <div class="chat-area">
            <div class="chat-header" id="current-channel-title"># genel-sohbet</div>
            <div class="chat-messages" id="chat-box">
                <!-- Varsayılan Hoş Geldin Mesajları -->
                <div class="message">
                    <div class="message-info">
                        <span class="msg-user">Sistem</span>
                        <span class="msg-tag">BOT</span>
                    </div>
                    <span class="msg-text">Vortex canlandırma projesine hoş geldin kanka! Burası senin yeni oyun üssün.</span>
                </div>
            </div>
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="msg-input" placeholder="Mesajını buraya yaz ve gönder..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">Gönder</button>
                </div>
            </div>
        </div>

        <!-- Sağ Menü: Arkadaşlar / Aktif Oyuncular -->
        <div class="sidebar-friends">
            <span class="section-title" style="margin-bottom: 15px; display: block;">Aktif Oyuncular (17)</span>
            <div class="friend-status"><div class="status-dot"></div> <span id="local-user-display">Sen</span></div>
            <div class="friend-status"><div class="status-dot"></div> Neymar_Edit06</div>
            <div class="friend-status"><div class="status-dot"></div> FF_Ranger</div>
            <div class="friend-status"><div class="status-dot"></div> eFoot_Kral</div>
            <div class="friend-status"><div class="status-dot"></div> Sergen_Y_Fan</div>
            <div class="friend-status"><div class="status-dot"></div> Kayseri_38</div>
        </div>

    </div>

    <script>
        let profilKullaniciAdi = "Oyuncu";
        let secilenOyun = "eFootball";
        let oyunTarzi = "Rank Kasma";

        // Mavi Butona Basınca Çalışacak Fonksiyon
        function enterApp() {
            const inputVal = document.getElementById('username-input').value.trim();
            if(inputVal === "") {
                alert("Kanka lütfen önce bir kullanıcı adı yaz!");
                return;
            }
            
            // Verileri Alıyoruz
            profilKullaniciAdi = inputVal;
            secilenOyun = document.getElementById('game-select').value;
            oyunTarzi = document.getElementById('style-select').value;

            // Ekrandaki "Sen" yazısını kullanıcının yazdığı isimle güncelliyoruz
            document.getElementById('local-user-display').innerText = profilKullaniciAdi + " (Sen)";

            // Ekranları Değiştiriyoruz
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'grid';

            // İlk Giriş Mesajını Otomatik Oluşturma
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `
                <div class="message">
                    <div class="message-info">
                        <span class="msg-user">${profilKullaniciAdi}</span>
                        <span class="msg-tag">${secilenOyun} / ${oyunTarzi}</span>
                    </div>
                    <span class="msg-text">Odaya giriş yaptı! Takım aranıyor...</span>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Kanal Değiştirme Efekti
        function changeChannel(channelName) {
            document.getElementById('current-channel-title').innerText = "# " + channelName;
            
            // Aktif kanal tasarımını güncelleme
            const items = document.querySelectorAll('.channel-item');
            items.forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Mesaj Gönderme Sistemi
        function sendMessage() {
            const input = document.getElementById('msg-input');
            const messageText = input.value.trim();
            
            if(messageText === "") return;

            const chatBox = document.getElementById('chat-box');
            
            // Ekrana Yeni Mesajı Basma
            chatBox.innerHTML += `
                <div class="message">
                    <div class="message-info">
                        <span class="msg-user">${profilKullaniciAdi}</span>
                        <span class="msg-tag">Oyuncu</span>
                    </div>
                    <span class="msg-text">${messageText}</span>
                </div>
            `;

            input.value = ""; // Giriş kutusunu temizle
            chatBox.scrollTop = chatBox.scrollHeight; // Sohbeti en aşağı kaydır
        }

        // Enter Tuşuna Basınca Gönderme
        function handleKeyPress(e) {
            if(e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
