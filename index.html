<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VORTEX | Ultimate Gaming Network</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Rajdhani:wght@500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #070709; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }

        /* GİRİŞ EKRANI */
        #login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; 
                       background: radial-gradient(circle at center, #1e1b4b 0%, #070709 100%); }
        .login-box { background: rgba(10, 10, 15, 0.95); padding: 40px; border-radius: 24px; 
                     border: 2px solid #3b82f6; width: 380px; text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; color: #3b82f6; font-size: 2.5rem; margin-bottom: 25px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #111116; border: 1px solid #334155; border-radius: 8px; color: white; }
        .btn-enter { width: 100%; padding: 15px; background: #2563eb; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }

        /* ANA EKRAN */
        #app-screen { display: none; height: 100vh; grid-template-columns: 280px 1fr 280px; }
        .sidebar { background: #0c0c14; border-right: 1px solid #1e293b; padding: 20px; }
        .chat-area { background: #0f0f18; display: flex; flex-direction: column; }
        .friends-bar { background: #0c0c14; border-left: 1px solid #1e293b; padding: 20px; }

        /* ARAMA BUTONLARI VE ARAYÜZ */
        .call-btn { width: 100%; padding: 10px; margin-bottom: 5px; border: none; border-radius: 6px; 
                    cursor: pointer; font-weight: bold; font-size: 0.8rem; transition: 0.3s; }
        .btn-voice { background: #10b981; color: white; }
        .btn-video { background: #8b5cf6; color: white; }
        .search-input { width: 100%; padding: 10px; background: #161622; border: 1px solid #334155; border-radius: 6px; color: white; margin-bottom: 20px; }
        
        .msg-box { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .chat-input { padding: 20px; border-top: 1px solid #1e293b; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>VORTEX</h1>
            <input type="text" id="user" placeholder="Kullanıcı Adın">
            <select id="game">
                <option>eFootball</option><option>GTA V</option><option>Minecraft</option>
                <option>Valorant</option><option>PUBG Mobile</option><option>Roblox</option>
                <option>Brawl Stars</option><option>Free Fire</option>
            </select>
            <button class="btn-enter" onclick="start()">LOBİYE GİRİŞ</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="sidebar">
            <h2 style="color:#3b82f6; margin-bottom:20px;">VORTEX</h2>
            <input type="text" class="search-input" placeholder="Arkadaş/Kanal Ara...">
            <div style="padding:10px; background:#1e293b; border-radius:6px; margin-bottom:10px;"># ana-lobi</div>
            <div style="padding:10px;"># squad-arama</div>
        </div>
        <div class="chat-area">
            <div style="padding:20px; border-bottom:1px solid #1e293b; display:flex; justify-content:space-between;">
                <h3>Sohbet Penceresi</h3>
                <!-- SESLİ VE GÖRÜNTÜLÜ ARAMA BUTONLARI EKLENDİ -->
                <div style="display:flex; gap:10px;">
                    <button class="call-btn btn-voice">📞 Sesli Ara</button>
                    <button class="call-btn btn-video">📹 Görüntülü Ara</button>
                </div>
            </div>
            <div id="msg-box" class="msg-box"></div>
            <div class="chat-input">
                <input type="text" id="msg" placeholder="Mesaj gönder...">
                <button onclick="send()" style="padding:0 20px; background:#3b82f6; border:none; color:white; border-radius:6px;">></button>
            </div>
        </div>
        <div class="friends-bar">
            <h3>AKTİF OYUNCULAR</h3>
            <div style="margin-top:20px;">🟢 Vortex_User</div>
        </div>
    </div>

    <script>
        function start() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'grid';
        }
        function send() {
            let m = document.getElementById('msg').value;
            if(!m) return;
            document.getElementById('msg-box').innerHTML += `<div style="padding:10px; border-bottom:1px solid #1e293b;"><b>Sen:</b> ${m}</div>`;
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
